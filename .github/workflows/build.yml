name: Build Maple-FunASR-Desktop

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --group build

      - name: Check Python syntax
        run: uv run python -m py_compile main.py

      - name: Check imports
        run: |
          uv run python -c "
          import sys; sys.path.insert(0, '.')
          from app.settings import Settings
          from app.utils import find_ffmpeg
          from core.hardware_checker import detect_all, estimate_speeds, pick_best_device
          from core.exporter import export_result
          print('All modules import OK')
          "

  build-windows:
    name: Build Windows (PyInstaller)
    runs-on: windows-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --group build

      - name: Cache ffmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ui/resources/ffmpeg.exe
          key: ffmpeg-7.1

      - name: Download ffmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zip = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\ffmpeg" -Force
          $exe = (Get-ChildItem "$env:TEMP\ffmpeg\ffmpeg-*\bin\ffmpeg.exe").FullName
          New-Item -ItemType Directory -Path "ui/resources" -Force | Out-Null
          Copy-Item $exe "ui/resources/ffmpeg.exe" -Force
          Remove-Item $zip -Force
          Remove-Item "$env:TEMP\ffmpeg" -Recurse -Force

      - name: Download ffmpeg license
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/FFmpeg/FFmpeg/master/LICENSE.md" -OutFile "ui/resources/LICENSE.ffmpeg"

      - name: Build with PyInstaller
        run: uv run pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maple-FunASR-Desktop-Windows
          path: dist/Maple-FunASR-Desktop/
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-windows]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Maple-FunASR-Desktop-Windows
          path: Maple-FunASR-Desktop-Windows

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path Maple-FunASR-Desktop-Windows -DestinationPath Maple-FunASR-Desktop-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Maple-FunASR-Desktop-${{ github.ref_name }}.zip
          generate_release_notes: true
